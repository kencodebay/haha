<!DOCTYPE html>
<html>
    <head>
        <title>Question 1</title>
        <meta charset="UTF-8">
    </head>
    <header>
        <h1>Ba Què là ai?</h1>
    </header>
    <main>
        <form>
            <input type="text" name="hihi" id="answer">
            <button type="button" onclick="checkAnswer()">Answer</button>
        </form>
        <form action="question6.html" method="get">
            <button type="submit">Next</button>
        </form>
        <div id="result"></div>
        
        <style>

            #result{
                
                margin-top:20px;
                font-size:75px;
                font-weight:bold;
            }

        </style>
        <script>

        function checkAnswer(){

            const answer = document.getElementById("answer").value;

            const result = document.getElementById("result");

            if(answer.toLowerCase() === "Trần Viết Thái"){

                result.innerHTML = "✅ Correct";

            }else{

                result.innerHTML = "❌ Wrong";

            }

        }

        </script>
    </main>
</html>
